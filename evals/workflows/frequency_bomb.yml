workflow:
  name: "Tier 3B — Frequency Bomb (Adversarial)"
  description: "Adversarial: declared volume is 10 requests/day, but the batch_processor step iterates over 1000 records per invocation — effective AI call volume is 10,000/day. Tool uses declared volume only and will score frequency as LOW (10 req/day) rather than HIGH (10,000 effective). Expected to MISS the frequency bomb pattern."
  owner: "Data Engineering"
  environment: "production"

steps:
  - id: trigger
    name: "Scheduled batch trigger"
    type: input
    description: "Nightly cron fires at 2 AM; passes batch job ID to processor"
    data_sensitivity: low

  - id: batch_processor
    name: "AI batch record processor"
    type: ai_action
    description: "FREQUENCY BOMB: loops over 1000 customer records per invocation, calling Claude API once per record to generate personalised summaries. Effective AI calls = 10 invocations/day × 1000 records = 10,000 Claude API calls/day. Declared volume (10/day) massively understates actual AI cost and rate-limit exposure."
    depends_on: [trigger]
    model: "claude-haiku-4-5"
    estimated_tokens_in: 800
    estimated_tokens_out: 300
    error_consequence: "Batch fails mid-loop — partial updates leave data in inconsistent state"
    reversible: false
    data_sensitivity: medium

  - id: write_summaries
    name: "Write summaries to database"
    type: ai_action
    description: "Bulk-insert 1000 generated summaries into customer_profiles table"
    depends_on: [batch_processor]
    error_consequence: "Database write failure — summaries lost, batch must rerun from scratch"
    reversible: false
    data_sensitivity: medium

  - id: report
    name: "Generate batch completion report"
    type: ai_generation
    description: "Summarise batch run statistics: records processed, errors, cost estimate"
    depends_on: [write_summaries]
    model: "claude-haiku-4-5"
    estimated_tokens_in: 500
    estimated_tokens_out: 200
    reversible: true
    data_sensitivity: low

volume:
  requests_per_day: 10
  peak_multiplier: 1
  growth_rate_monthly_pct: 5.0

risk:
  regulatory_environment: "standard"
  customer_facing: false
  financial_impact_per_error: 200.0
  brand_risk: "low"
  data_classification: "PII"
